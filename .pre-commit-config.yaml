repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.8.3
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.6.2
    hooks:
      - id: prettier
  - repo: local
    hooks:
      - id: tsc
        name: tsc
        entry: bun run tsc
        language: system
        types: [javascript, ts, tsx, jsx]
        pass_filenames: false
      - id: basedpyright
        language: system
        name: basedpyright
        types: [python]
        entry: uv run basedpyright
