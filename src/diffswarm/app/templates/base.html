<!doctype html>
<html lang="en">
  <head>
    <title>{% block title %}diffswarm{% endblock %}</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="https://zany.sh/favicon.svg?emoji=🐝" />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    {% block scripts %}{% endblock %}
    <style type="text/tailwindcss">
      @theme {
        --color-monokai-bg: hsl(220 13% 9%);
        --color-monokai-surface: hsl(220 13% 11%);
        --color-monokai-elevated: hsl(220 13% 15%);
        --color-monokai-border: hsl(220 13% 18%);
        --color-monokai-muted: hsl(220 9% 46%);
        --color-monokai-text: hsl(60 9% 87%);
        --color-monokai-yellow: hsl(54 100% 68%);
        --color-monokai-orange: hsl(31 100% 71%);
        --color-monokai-red: hsl(0 100% 67%);
        --color-monokai-magenta: hsl(326 100% 74%);
        --color-monokai-blue: hsl(210 100% 66%);
        --color-monokai-cyan: hsl(180 100% 66%);
        --color-monokai-green: hsl(120 100% 75%);
        --color-monokai-diff-add: hsl(120 100% 60%);
        --color-monokai-diff-remove: hsl(0 100% 65%);
      }

      :root {
        --background: 0 0% 100%;
        --foreground: 222.2 84% 4.9%;
        --card: 0 0% 100%;
        --card-foreground: 222.2 84% 4.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 222.2 84% 4.9%;
        --primary: 222.2 47.4% 11.2%;
        --primary-foreground: 210 40% 98%;
        --secondary: 210 40% 96%;
        --secondary-foreground: 222.2 47.4% 11.2%;
        --muted: 210 40% 96%;
        --muted-foreground: 215.4 16.3% 46.9%;
        --accent: 210 40% 96%;
        --accent-foreground: 222.2 47.4% 11.2%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 210 40% 98%;
        --border: 214.3 31.8% 91.4%;
        --input: 214.3 31.8% 91.4%;
        --ring: 222.2 84% 4.9%;

        --code-foreground: 222.2 84% 2%;
        --line-number-color: 220 9% 55%;

        /* Light mode diff colors */
        --diff-add-bg: 142 76% 96%;
        --diff-add-border: 142 76% 36%;
        --diff-add-text: 142 76% 20%;
        --diff-remove-bg: 0 93% 96%;
        --diff-remove-border: 0 93% 46%;
        --diff-remove-text: 0 93% 25%;
        --diff-add-hover-bg: 142 76% 92%;
        --diff-remove-hover-bg: 0 93% 92%;
        --diff-context-hover-bg: 220 13% 96%;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* Monokai Pro Filter Machine Dark Theme */
          --background: 220 13% 9%; /* Very dark charcoal background */
          --foreground: 60 9% 93%; /* Light gray text */
          --card: 220 13% 11%; /* Slightly lighter than background */
          --card-foreground: 60 9% 87%; /* Light gray text */
          --popover: 220 13% 11%; /* Card color for popovers */
          --popover-foreground: 60 9% 87%; /* Light gray text */
          --primary: 60 9% 87%; /* Light gray for primary elements */
          --primary-foreground: 220 13% 9%; /* Dark background for primary text */
          --secondary: 220 13% 15%; /* Darker gray for secondary elements */
          --secondary-foreground: 60 9% 87%; /* Light gray text */
          --muted: 220 13% 15%; /* Muted background */
          --muted-foreground: 220 9% 46%; /* Muted text */
          --accent: 220 13% 15%; /* Accent background */
          --accent-foreground: 60 9% 87%; /* Light text on accent */
          --destructive: 0 74% 42%; /* Red for destructive actions */
          --destructive-foreground: 60 9% 87%; /* Light text on destructive */
          --border: 220 13% 18%; /* Border color */
          --input: 220 13% 15%; /* Input background */
          --ring: 217 91% 60%; /* Blue ring color for focus */

          --code-foreground: 60 9% 87%;
          --line-number-color: 220 9% 46%;

          /* More vibrant Monokai Pro diff colors */
          --diff-add-bg: 120 100% 12%; /* Darker green background for more contrast */
          --diff-add-border: 120 100% 45%; /* Brighter, more vibrant green border */
          --diff-add-text: 120 100% 85%; /* Brighter green text */
          --diff-remove-bg: 0 100% 12%; /* Darker red background for more contrast */
          --diff-remove-border: 0 100% 55%; /* Brighter, more vibrant red border */
          --diff-remove-text: 0 100% 85%; /* Brighter red text */

          /* Enhanced hover colors for dark mode */
          --diff-add-hover-bg: 120 100% 18%; /* Brighter green hover */
          --diff-remove-hover-bg: 0 100% 18%; /* Brighter red hover */
          --diff-context-hover-bg: 220 13% 20%; /* Lighter context hover */
        }
      }

      .font-code {
        font-family:
          "JetBrains Mono", "SF Mono", Monaco, "Cascadia Code", "Roboto Mono",
          Consolas, "Courier New", monospace;
        font-weight: 400;
        font-feature-settings:
          "liga" 1,
          "calt" 1;
        font-variant-ligatures: common-ligatures;
      }

      body {
        background-color: hsl(var(--background));
        color: hsl(var(--foreground));
        background: hsl(220 9% 96%);
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: hsl(220 13% 13%);
        }
      }

      .diff-add {
        background-color: hsl(var(--diff-add-bg));
        border-left-color: hsl(var(--diff-add-border));
        color: hsl(var(--diff-add-text));
      }

      .diff-add:hover {
        background-color: hsl(var(--diff-add-hover-bg)) !important;
        border-left-color: hsl(var(--diff-add-border));
      }

      .diff-remove {
        background-color: hsl(var(--diff-remove-bg));
        border-left-color: hsl(var(--diff-remove-border));
        color: hsl(var(--diff-remove-text));
      }

      .diff-remove:hover {
        background-color: hsl(var(--diff-remove-hover-bg)) !important;
        border-left-color: hsl(var(--diff-remove-border));
      }

      .diff-context:hover {
        background-color: hsl(var(--diff-context-hover-bg)) !important;
      }

      /* Smooth transitions */
      .transition-diff {
        transition: all 0.15s ease-in-out;
      }

      .shadow-elegant {
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
      }

      @media (prefers-color-scheme: dark) {
        .shadow-elegant {
          box-shadow:
            0 4px 6px -1px rgb(0 0 0 / 0.5),
            0 2px 4px -2px rgb(0 0 0 / 0.3);
        }
      }

      /* Enhanced scrollbars and styles for dark mode */
      @media (prefers-color-scheme: dark) {
        :root {
          scrollbar-width: thin;
          scrollbar-color: hsl(220 13% 25%) hsl(220 13% 11%);
        }

        ::-webkit-scrollbar {
          width: 8px;
          height: 8px;
        }

        ::-webkit-scrollbar-track {
          background: hsl(220 13% 11%);
        }

        ::-webkit-scrollbar-thumb {
          background: hsl(220 13% 25%);
          border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
          background: hsl(220 13% 35%);
        }

        /* Selection colors */
        ::selection {
          background: hsl(220 13% 25%);
          color: hsl(60 9% 87%);
        }

        /* Focus ring with blue color */
        .focus\:ring-2:focus {
          --tw-ring-color: hsl(217 91% 60%);
        }
      }
    </style>
    {% block styles %}{% endblock %}
  </head>
  <body class="h-screen flex flex-col">
    {% block content %}{% endblock %}
    <footer class="mt-auto">
      <div class="max-w-6xl mx-auto px-6 py-6">
        <div class="text-center">
          <p class="text-sm text-gray-600 dark:text-monokai-muted">
            © 2025
            <a href="{{ url_for('home') }}" class="underline">diffswarm</a
            >.<br />
            <span class="text-gray-400 dark:text-monokai-muted">
              built by
              <a class="underline" href="https://github.com/thejchap"
                >thejchap</a
              >
            </span>
          </p>
        </div>
      </div>
    </footer>
  </body>
</html>
